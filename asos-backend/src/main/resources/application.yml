server:
  port: 8080
  servlet:
    session:
      timeout: 12h
      cookie:
        name: ASOS_SESSION
        http-only: true
        same-site: lax
        # Set to true once served over HTTPS in production.
        secure: false

spring:
  application:
    name: asos-backend

  datasource:
    # ---- Aiven PostgreSQL connection ----
    # Get these values from your Aiven console -> Service -> Connection Information
    # Aiven requires SSL, so sslmode=require is included in the URL.
    url: jdbc:postgresql://${DB_HOST:REPLACE_WITH_AIVEN_HOST}:${DB_PORT:REPLACE_WITH_AIVEN_PORT}/${DB_NAME:defaultdb}?sslmode=require
    username: ${DB_USERNAME:avnadmin}
    password: ${DB_PASSWORD:REPLACE_WITH_AIVEN_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    default-property-inclusion: non_null

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.asos.backend: DEBUG
    org.hibernate.SQL: DEBUG
